# Local PostgreSQL (pgvector) + Redis for Phase 1.
# Ports avoid conflicts with common local installs: Postgres 5433, Redis 6380.
#
# Optional: set PERSONA_REDIS_IMAGE (e.g. in repo-root .env) if Docker Hub fails.
# Postgres is built from Dockerfile.postgres (pgvector on postgres:16-alpine).

services:
  postgres:
    image: persona-postgres-pg16:local
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: phase1-postgres
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: persona
      POSTGRES_PASSWORD: persona_dev
      POSTGRES_DB: persona
    ports:
      - "5433:5432"
    volumes:
      - phase1_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persona -d persona"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: ${PERSONA_REDIS_IMAGE:-redis:7.4-alpine}
    container_name: phase1-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - phase1_redis:/data
    # AOF persistence for dev (survives container restarts)
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  phase1_pgdata:
  phase1_redis:
